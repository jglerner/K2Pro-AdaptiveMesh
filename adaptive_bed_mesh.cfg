[gcode_macro ADAPTIVE_BED_MESH]
description: 9x9 adaptive bed mesh for K2 Pro — heats to leveling temps, homes, then probes the model area + 9 mm margin
gcode:
    {% set bed_min = 10 %}
    {% set bed_max = 290 %}
    {% set padding = 9 %}

    {% set min_x = [params.PRINT_MIN_X|default(bed_min)|float - padding, bed_min]|max %}
    {% set min_y = [params.PRINT_MIN_Y|default(bed_min)|float - padding, bed_min]|max %}
    {% set max_x = [params.PRINT_MAX_X|default(bed_max)|float + padding, bed_max]|min %}
    {% set max_y = [params.PRINT_MAX_Y|default(bed_max)|float + padding, bed_max]|min %}

    # Preheat to leveling temperatures
    # Bed  40 °C — enough for thermal stabilisation, avoids full-print expansion skew
    # Tool 140 °C — softens residual filament on the nozzle so it doesn't drag; too cold to drip
    M117 Heating for bed leveling...
    M140 S40
    M104 S140
    M190 S40
    M109 S140

    G28

    {action_respond_info("Adaptive mesh: 9x9 | area (%.0f,%.0f)-(%.0f,%.0f)" % (min_x, min_y, max_x, max_y))}
    M117 Mesh area ({min_x|int},{min_y|int})-({max_x|int},{max_y|int})
    BED_MESH_CALIBRATE PROFILE=default MESH_MIN={min_x},{min_y} MESH_MAX={max_x},{max_y} PROBE_COUNT=9,9
    M117 Leveling complete.
