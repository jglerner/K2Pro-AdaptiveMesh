[gcode_macro ADAPTIVE_BED_MESH]
description: 9x9 adaptive bed mesh for K2 Pro — derives print area from exclude_object data (KAMP-style), with param and full-bed fallbacks
gcode:
    {% set bed_min = 10 %}
    {% set bed_max = 290 %}
    {% set padding = 9 %}

    # Priority 1: exclude_object polygons (no slicer vector-variable syntax needed)
    {% if printer.exclude_object is defined and printer.exclude_object.objects | length > 0 %}
        {% set ns = namespace(min_x=bed_max, min_y=bed_max, max_x=bed_min, max_y=bed_min) %}
        {% for obj in printer.exclude_object.objects %}
            {% for pt in obj.polygon %}
                {% if pt[0] < ns.min_x %}{% set ns.min_x = pt[0] %}{% endif %}
                {% if pt[1] < ns.min_y %}{% set ns.min_y = pt[1] %}{% endif %}
                {% if pt[0] > ns.max_x %}{% set ns.max_x = pt[0] %}{% endif %}
                {% if pt[1] > ns.max_y %}{% set ns.max_y = pt[1] %}{% endif %}
            {% endfor %}
        {% endfor %}
        {% set min_x = [ns.min_x - padding, bed_min] | max %}
        {% set min_y = [ns.min_y - padding, bed_min] | max %}
        {% set max_x = [ns.max_x + padding, bed_max] | min %}
        {% set max_y = [ns.max_y + padding, bed_max] | min %}

    # Priority 2: explicit params (legacy — OrcaSlicer older builds or manual calls)
    {% elif params.PRINT_MIN_X is defined %}
        {% set min_x = [params.PRINT_MIN_X|float - padding, bed_min] | max %}
        {% set min_y = [params.PRINT_MIN_Y|float - padding, bed_min] | max %}
        {% set max_x = [params.PRINT_MAX_X|float + padding, bed_max] | min %}
        {% set max_y = [params.PRINT_MAX_Y|float + padding, bed_max] | min %}

    # Priority 3: full bed — no area data available
    {% else %}
        {% set min_x = bed_min %}
        {% set min_y = bed_min %}
        {% set max_x = bed_max %}
        {% set max_y = bed_max %}
        {action_respond_info("ADAPTIVE_BED_MESH: no area data — falling back to full bed")}
    {% endif %}

    # Home all axes before probing
    G28

    # Preheat to leveling temperatures
    # Bed  40 °C — enough for thermal stabilisation, avoids full-print expansion skew
    # Tool 140 °C — softens residual filament on the nozzle so it doesn't drag; too cold to drip
    M117 Heating for bed leveling...
    M140 S40
    M104 S140
    M190 S40
    M109 S140

    {action_respond_info("Adaptive mesh: 9x9 | area (%.0f,%.0f)-(%.0f,%.0f)" % (min_x, min_y, max_x, max_y))}
    M117 Mesh ({min_x|int},{min_y|int})-({max_x|int},{max_y|int})
    BED_MESH_CALIBRATE PROFILE=default MESH_MIN={min_x},{min_y} MESH_MAX={max_x},{max_y} PROBE_COUNT=9,9
    M117 Leveling complete.
